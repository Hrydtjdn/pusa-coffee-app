    <!-- LOGIKA JAVASCRIPT UTAMA -->
    <!-- ============================================== -->
    <script>
        const SUPABASE_URL = 'https://osrlijqkewwmrxzvxpqt.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_3Gy9v5yQa69iQFwoAJwHuQ_JruTyt_k';

        let db;
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        let currentUser = null;
        let produkListLocal = []; 
        let editProductId = null; 
        
        let stockListLocal = [];
        let editStockId = null;

        // State Manajemen Laporan Shift (Wizard)
        let wizardStep = 1;
        let formPenjualan = { 
            tanggal: new Date().toISOString().split('T')[0], 
            rincian: [], 
            cash: '', qris: '', transfer: '' 
        };
        let formStockKeluar = {}; 
        let formPengeluaran = []; 
        
        let isEditLaporan = false;
        let oldReportData = null;

        // Laporan Harian State
        let reportMonth = new Date().getMonth() + 1;
        let reportYear = new Date().getFullYear();

        const MENUS = {
            OWNER: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'laporan_shift', label: 'Input Laporan Shift', icon: 'ph-clipboard-text' },
                { id: 'master', label: 'Master Data', icon: 'ph-database', sub: ['Master Akses', 'Master Akun', 'Master Produk', 'Master Harga', 'Master Resep'] },
                { id: 'stock', label: 'Stock', icon: 'ph-package', sub: ['Stock Masuk', 'Stock Adjustment', 'Stock Opname', 'Riwayat Stock'] },
                { id: 'shift', label: 'Shift', icon: 'ph-clock', sub: ['Monitoring Shift', 'Approval Shift', 'Riwayat Shift'] },
                { id: 'keuangan', label: 'Keuangan', icon: 'ph-wallet', sub: ['Input Pengeluaran', 'Cash Flow', 'Approval Pengeluaran'] },
                { id: 'laporan', label: 'Laporan', icon: 'ph-chart-line-up', sub: ['Penjualan', 'Stock', 'Laba Rugi', 'Food Cost'] },
                { id: 'pengaturan', label: 'Pengaturan', icon: 'ph-gear' }
            ],
            KARYAWAN: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'laporan_shift', label: 'Input Laporan Shift', icon: 'ph-clipboard-text' },
                { id: 'shift_k', label: 'Shift Operasional', icon: 'ph-clock', sub: ['Buka Shift', 'Tutup Shift'] },
                { id: 'riwayat', label: 'Riwayat Laporan', icon: 'ph-clock-counter-clockwise' },
                { id: 'profil', label: 'Profil Saya', icon: 'ph-user' }
            ]
        };

        window.addEventListener('DOMContentLoaded', async () => {
            if (!db) return;
            const { data: { session } } = await db.auth.getSession();
            if (session) fetchUserProfile(session.user);
        });

        async function handleLogin(e) {
            e.preventDefault();
            if (!db) return alert("Koneksi Supabase error.");
            
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Memproses...';
            btn.disabled = true;

            const { data, error } = await db.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });

            if (error) {
                alert("Gagal Masuk: " + error.message);
                btn.innerHTML = '<span>MASUK</span><i class="ph ph-sign-in text-xl"></i>';
                btn.disabled = false;
            } else {
                fetchUserProfile(data.user);
            }
        }

        async function fetchUserProfile(authUser) {
            const { data: profile, error } = await db.from('profiles').select('nama, role, outlet, status').eq('id', authUser.id).single();
            if (error || !profile || profile.status !== 'Aktif') { alert("Akun bermasalah."); logout(); return; }
            currentUser = { id: authUser.id, nama: profile.nama, role: profile.role, outlet: profile.outlet };
            initApp();
        }

        async function logout() {
            if (db) await db.auth.signOut();
            currentUser = null;
            document.getElementById('view-app').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('form-login').reset();
            document.getElementById('btn-login').disabled = false;
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            document.getElementById('user-name-display').textContent = currentUser.nama;
            document.getElementById('user-role-display').textContent = currentUser.role;
            generateSidebar();
            loadPage('dashboard');
        }

        function generateSidebar() {
            const menuContainer = document.getElementById('sidebar-menu');
            menuContainer.innerHTML = ''; 
            MENUS[currentUser.role].forEach(item => {
                const btn = document.createElement('button');
                
                btn.className = `w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all group text-white/80 hover:bg-white/10 hover:text-white`;
                btn.innerHTML = `<div class="flex items-center gap-3"><i class="ph ${item.icon} text-xl group-hover:text-pbg transition-colors"></i><span class="font-medium text-sm tracking-wide">${item.label}</span></div>` + (item.sub ? `<i class="ph ph-caret-down text-xs opacity-50"></i>` : '');
                menuContainer.appendChild(btn);

                if(item.sub) {
                    const subDiv = document.createElement('div');
                    subDiv.className = "pl-11 pr-4 py-2 space-y-1 hidden"; 
                    item.sub.forEach(subItem => {
                        const subBtn = document.createElement('div');

                    });
                    menuContainer.appendChild(subDiv);

        function loadPage(pageId, title = "Dashboard") {
            document.getElementById('page-title').textContent = title;
            
            if (pageId === 'master' && title === 'Master Produk') { renderMasterProdukView(); return; }
            if (pageId === 'stock' && title === 'Stock Masuk') { renderStockView(); return; }
            if (pageId === 'stock' && title === 'Riwayat Stock') { renderRiwayatStockView(); return; }
            if (pageId === 'laporan_shift' || title === 'Input Laporan Shift') { wizardStep = 1; renderLaporanShiftView(); return; }
            if (pageId === 'laporan' && title === 'Penjualan') { renderLaporanPenjualanView(); return; }
            if (pageId === 'keuangan' && title === 'Input Pengeluaran') { renderKeuanganView(); return; }

            const content = document.getElementById('main-content');
            content.innerHTML = '<div class="flex justify-center mt-20"><i class="ph ph-spinner animate-spin text-4xl text-pdark"></i></div>';

            setTimeout(async () => {
                if(pageId === 'dashboard') renderDashboardView();
                else renderDefaultView(title);
            }, 200);
        }

            isEditLaporan = false;
            oldReportData = null;

        async function prosesSimpanLaporan() {
            const btn = document.getElementById('btn-next-wizard');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Menyimpan...';
            btn.disabled = true;

            // FIX NUMERIC ERROR: Mengubah nilai string kosong ('') menjadi 0
            const omzetCash = Number(formPenjualan.cash) || 0;
            const omzetQris = Number(formPenjualan.qris) || 0;
            const omzetTransfer = Number(formPenjualan.transfer) || 0;
            const totalOmzet = omzetCash + omzetQris + omzetTransfer;
            const totalCup = formPenjualan.rincian.reduce((sum, i) => sum + i.qty, 0);

            try {
                // 1. Kalkulasi dan Update Perbedaan Stok (Stock Delta)
                for (const stock of stockListLocal) {
                    let oldKeluar = 0;
                    if (typeof isEditLaporan !== 'undefined' && isEditLaporan && oldReportData && oldReportData.detail_stock_keluar) {
                        let oldD = oldReportData.detail_stock_keluar[stock.id];
                        if(oldD) oldKeluar = Number(oldD.terpakai) + Number(oldD.tumpah);
                    }
                    
                    let newKeluar = 0;
                    if (formStockKeluar[stock.id]) {
                        let newD = formStockKeluar[stock.id];
                        newKeluar = Number(newD.terpakai) + Number(newD.tumpah);
                    }

                    let diff = newKeluar - oldKeluar;
                    
                    if (diff !== 0) {
                        let { data: currentStock } = await db.from('stocks').select('qty').eq('id', stock.id).single();
                        if(currentStock) {
                            let finalQty = Number(currentStock.qty) - diff;
                            await db.from('stocks').update({ qty: finalQty }).eq('id', stock.id);
                        }
                    }
                }

                if (typeof isEditLaporan !== 'undefined' && isEditLaporan) {
                    await db.from('shift_reports').delete().eq('tanggal', formPenjualan.tanggal);
                    await db.from('expenses').delete().eq('tanggal', formPenjualan.tanggal);
                }

                const { error: err1 } = await db.from('shift_reports').insert([{
                    tanggal: formPenjualan.tanggal, kasir_nama: currentUser.nama, total_cup: totalCup,
                    omzet_cash: omzetCash, omzet_qris: omzetQris, omzet_transfer: omzetTransfer,
                    total_omzet: totalOmzet, detail_penjualan: formPenjualan.rincian, detail_stock_keluar: formStockKeluar
                }]);
                if (err1) throw err1;

                if (formPengeluaran.length > 0) {
                    const expPayload = formPengeluaran.map(ex => ({ 
                        tanggal: formPenjualan.tanggal, 
                        nama_barang: ex.nama, 
                        harga: Number(ex.harga) || 0, 
                        qty: Number(ex.qty) || 1, 
                        total: (Number(ex.harga) || 0) * (Number(ex.qty) || 1) 
                    }));
                    const { error: err2 } = await db.from('expenses').insert(expPayload);
                    if (err2) throw err2;
                }

                alert((typeof isEditLaporan !== 'undefined' && isEditLaporan) ? "✅ LAPORAN BERHASIL DIKOREKSI!" : "✅ LAPORAN SHIFT BERHASIL DISIMPAN!");
                
                let wasEdit = typeof isEditLaporan !== 'undefined' ? isEditLaporan : false;
                if(typeof isEditLaporan !== 'undefined') isEditLaporan = false;
                if(typeof oldReportData !== 'undefined') oldReportData = null;
                
                formPenjualan = { tanggal: new Date().toISOString().split('T')[0], rincian: [], cash: '', qris: '', transfer: '' };
                formStockKeluar = {}; formPengeluaran = [];
                
                loadPage(wasEdit ? 'laporan' : 'dashboard', wasEdit ? 'Penjualan' : 'Dashboard');

            } catch (err) {
                alert("Terjadi kesalahan: " + err.message);
                btn.innerHTML = 'SIMPAN LAPORAN';
                btn.disabled = false;
            }
        }

        async function fetchDataLaporanPenjualan() {
            if(!db) return;
            
            const monthVal = document.getElementById('filter-month').value;
            const yearVal = document.getElementById('filter-year').value;
            reportMonth = parseInt(monthVal);
            reportYear = parseInt(yearVal);

            const tbody = document.getElementById('laporan-table-body');
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400"><i class="ph ph-spinner animate-spin text-2xl mb-2 block mx-auto"></i> Memuat data...</td></tr>`;

            // Setup Date Bounds
            const startDateStr = `${reportYear}-${String(reportMonth).padStart(2, '0')}-01`;
            const lastDay = new Date(reportYear, reportMonth, 0).getDate();
            const endDateStr = `${reportYear}-${String(reportMonth).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

            try {
                // Fetch Data
                const { data: sales, error: errSales } = await db.from('shift_reports')
                    .select('tanggal, total_cup, total_omzet')
                    .gte('tanggal', startDateStr)
                    .lte('tanggal', endDateStr);

                const { data: expenses, error: errExp } = await db.from('expenses')
                    .select('tanggal, total')
                    .gte('tanggal', startDateStr)
                    .lte('tanggal', endDateStr);

                if (errSales || errExp) throw new Error("Gagal menarik data");

                // Aggregation Setup
                let dailyData = {};
                let grandTotalCup = 0;
                let grandTotalOmzet = 0;
                let grandTotalPengeluaran = 0;

                // Pre-fill days of the month
                for(let i = 1; i <= lastDay; i++) {
                    let dStr = `${reportYear}-${String(reportMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    dailyData[dStr] = { cup: 0, omzet: 0, pengeluaran: 0 };
                }

                // Aggregate Sales
                if (sales) {
                    sales.forEach(s => {
                        if(dailyData[s.tanggal]) {
                            dailyData[s.tanggal].cup += Number(s.total_cup) || 0;
                            dailyData[s.tanggal].omzet += Number(s.total_omzet) || 0;
                            grandTotalCup += Number(s.total_cup) || 0;
                            grandTotalOmzet += Number(s.total_omzet) || 0;
                        }
                    });
                }

                // Aggregate Expenses
                if (expenses) {
                    expenses.forEach(e => {
                        if(dailyData[e.tanggal]) {
                            dailyData[e.tanggal].pengeluaran += Number(e.total) || 0;
                            grandTotalPengeluaran += Number(e.total) || 0;
                        }
                    });
                }

                let grandLabaKotor = grandTotalOmzet - grandTotalPengeluaran;

                // Update Summary Cards
                document.getElementById('sum-penjualan').textContent = grandTotalCup.toLocaleString('id-ID');
                document.getElementById('sum-omzet').textContent = 'Rp ' + grandTotalOmzet.toLocaleString('id-ID');
                document.getElementById('sum-pengeluaran').textContent = 'Rp ' + grandTotalPengeluaran.toLocaleString('id-ID');
                document.getElementById('sum-laba').textContent = 'Rp ' + grandLabaKotor.toLocaleString('id-ID');
                
                // Update Footer
                document.getElementById('laporan-footer-text').textContent = `Menampilkan data 1 – ${lastDay} dari ${lastDay} hari`;

                // Render Table
                let rowsHtml = '';
                for(let i = 1; i <= lastDay; i++) {
                    let dStr = `${reportYear}-${String(reportMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    let data = dailyData[dStr];
                    
                    // Format Date for UI (e.g., 1 Jun 2026)
                    let dateObj = new Date(reportYear, reportMonth - 1, i);
                    let formattedDate = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                    
                    let labaKotor = data.omzet - data.pengeluaran;
                    let rowClass = data.omzet > 0 || data.pengeluaran > 0 ? 'bg-white hover:bg-gray-50' : 'bg-gray-50/30 opacity-70 hover:bg-gray-50 text-gray-500';

                    rowsHtml += `
                    <tr class="transition-colors ${rowClass}">
                        <td class="p-4 pl-6 font-semibold">${formattedDate}</td>
                        <td class="p-4 text-center font-bold">${data.cup > 0 ? data.cup : '-'}</td>
                        <td class="p-4 text-right font-medium">Rp ${data.omzet.toLocaleString('id-ID')}</td>
                        <td class="p-4 text-right font-medium">Rp ${data.pengeluaran.toLocaleString('id-ID')}</td>
                        <td class="p-4 text-right font-bold ${labaKotor > 0 ? 'text-pdark' : labaKotor < 0 ? 'text-red-500' : ''}">Rp ${labaKotor.toLocaleString('id-ID')}</td>
                        <td class="p-4 pr-6 text-center">
                            ${data.omzet > 0 || data.pengeluaran > 0 ? `<button onclick="editLaporanHarian('${dStr}', event)" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center hover:bg-blue-100 transition-colors mx-auto shadow-sm active:scale-95" title="Koreksi Laporan"><i class="ph ph-pencil-simple text-lg"></i></button>` : `<span class="text-gray-300">-</span>`}
                        </td>
                    </tr>`;
                }

                tbody.innerHTML = rowsHtml;

            } catch(e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-red-500 font-bold">Terjadi kesalahan saat memuat data.</td></tr>`;
            }
        }

                if (rep) {

                        tanggal: rep.tanggal, rincian: rep.detail_penjualan || [],
                        cash: rep.omzet_cash || '', qris: rep.omzet_qris || '', transfer: rep.omzet_transfer || ''
                    };
                    formStockKeluar = rep.detail_stock_keluar || {};
                } else {
                    formPenjualan = { tanggal: tgl, rincian: [], cash: '', qris: '', transfer: '' };

                }

                if (exp && exp.length > 0) {
                    formPengeluaran = exp.map(e => ({ id: e.id || (Date.now() + Math.random()), nama: e.nama_barang, qty: e.qty, harga: e.harga }));
                } else {
                    formPengeluaran = [];
                }

                isEditLaporan = true;
                oldReportData = rep; 
                
                loadPage('laporan_shift', 'Koreksi Laporan Shift');
                
            } catch (err) {
                alert("Gagal memuat data laporan untuk dikoreksi.");
                console.error(err);
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

                });
                
                tbody.innerHTML = rows.join('');
                document.getElementById('total-biaya-keuangan').textContent = "Rp " + total.toLocaleString('id-ID');

            } catch (e) {
                console.error(e);
                tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-500 font-bold">Terjadi kesalahan. Pastikan tabel 'operational_expenses' sudah dibuat.</td></tr>`;
            }
        }

        function bukaModalKeuangan() {
            editKeuanganId = null;
            document.getElementById('form-keuangan').reset();
            document.getElementById('k-tanggal').value = new Date().toISOString().split('T')[0];
            document.getElementById('modal-title-keuangan').innerHTML = '<i class="ph ph-wallet"></i> Input Pengeluaran';
            document.getElementById('btn-simpan-keuangan').innerHTML = 'SIMPAN PENGELUARAN';
            document.getElementById('modal-keuangan').classList.remove('hidden');
        }

        function tutupModalKeuangan() {
            document.getElementById('modal-keuangan').classList.add('hidden');
        }

        async function simpanKeuangan(e) {
            e.preventDefault();
            if(!db) return;

            const payload = {
                tanggal: document.getElementById('k-tanggal').value,
                kategori: document.getElementById('k-kategori').value,
                keterangan: document.getElementById('k-keterangan').value,
                jumlah: Number(document.getElementById('k-jumlah').value) || 0
            };

            if (editKeuanganId) {
                await db.from('operational_expenses').update(payload).eq('id', editKeuanganId);
            } else {
                await db.from('operational_expenses').insert([payload]);
            }

            tutupModalKeuangan();
            fetchDataKeuangan();
        }

        async function editKeuangan(id) {
            if(!db) return;
            const { data, error } = await db.from('operational_expenses').select('*').eq('id', id).single();
            if(data) {
                editKeuanganId = id;
                document.getElementById('k-tanggal').value = data.tanggal;
                document.getElementById('k-kategori').value = data.kategori;
                document.getElementById('k-keterangan').value = data.keterangan;
                document.getElementById('k-jumlah').value = data.jumlah;
                
                document.getElementById('modal-title-keuangan').innerHTML = '<i class="ph ph-pencil-simple text-blue-600"></i> Edit Pengeluaran';
                document.getElementById('btn-simpan-keuangan').innerHTML = 'SIMPAN PERUBAHAN';
                document.getElementById('modal-keuangan').classList.remove('hidden');
            }
        }

        async function hapusKeuangan(id) {
            if(!db) return;
            if(confirm("Apakah Anda yakin ingin menghapus data pengeluaran ini?")) {
                await db.from('operational_expenses').delete().eq('id', id);
                fetchDataKeuangan();
            }
        }

        function renderDefaultView(title) { document.getElementById('main-content').innerHTML = `<div class="bg-white p-12 rounded-3xl text-center mt-10 fade-in border border-gray-50"><div class="w-20 h-20 bg-plight rounded-3xl flex items-center justify-center text-pdark mx-auto mb-6"><i class="ph ph-hammer text-4xl"></i></div><h3 class="text-2xl font-bold text-pdark mb-2">Modul ${title}</h3><p class="text-gray-500">Antarmuka ini siap dihubungkan ke operasi tabel PostgreSQL.</p></div>`; }
    </script>
</body>
</html>
