<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSA COFFEE APP - FULL VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { pbg: '#b8d1b9', pdark: '#2a632e', plight: '#f0f4f0' }, borderRadius: { 'pcard': '2.5rem' } } } }
    </script>
</head>
<body class="bg-pbg text-gray-800 font-sans">

    <div id="view-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-pcard shadow-2xl max-w-sm w-full p-8 text-center">
            <h2 class="text-2xl font-black text-pdark mb-6">PUSA COFFEE</h2>
            <form id="form-login" onsubmit="handleLogin(event)">
                <input type="email" id="email" class="w-full bg-plight rounded-xl p-4 mb-4" placeholder="Email" required>
                <input type="password" id="password" class="w-full bg-plight rounded-xl p-4 mb-6" placeholder="Password" required>
                <button type="submit" class="w-full bg-pdark text-white font-bold p-4 rounded-xl">MASUK</button>
            </form>
        </div>
    </div>

    <div id="view-app" class="hidden h-screen flex">
        <div class="w-64 bg-pdark text-white p-4">
            <div class="text-xl font-black mb-8 px-2">PUSA COFFEE</div>
            <div id="sidebar-menu" class="space-y-2"></div>
            <button onclick="logout()" class="absolute bottom-4 text-red-300 font-bold px-4">KELUAR</button>
        </div>
        <div class="flex-1 p-8 overflow-y-auto">
            <h1 id="page-title" class="text-3xl font-black text-pdark mb-8">Dashboard</h1>
            <div id="main-content"></div>
        </div>
    </div>

    <script>
        const db = supabase.createClient('https://osrlijqkewwmrxzvxpqt.supabase.co', 'sb_publishable_3Gy9v5yQa69iQFwoAJwHuQ_JruTyt_k');
        
        // Navigation Logic
        const MENUS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
            { id: 'master', label: 'Master Produk', icon: 'ph-database' },
            { id: 'laporan', label: 'Laporan Penjualan', icon: 'ph-chart-line-up' }
        ];

        async function handleLogin(e) {
            e.preventDefault();
            const { error } = await db.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if(error) alert(error.message); else { document.getElementById('view-login').classList.add('hidden'); document.getElementById('view-app').classList.remove('hidden'); initApp(); }
        }

        function initApp() {
            const sb = document.getElementById('sidebar-menu');
            MENUS.forEach(m => {
                const b = document.createElement('button');
                b.className = "w-full text-left p-3 hover:bg-white/10 rounded-lg flex items-center gap-3";
                b.innerHTML = `<i class="ph ${m.icon}"></i> ${m.label}`;
                b.onclick = () => loadPage(m.id, m.label);
                sb.appendChild(b);
            });
            loadPage('dashboard', 'Dashboard');
        }

        function loadPage(id, label) {
            document.getElementById('page-title').textContent = label;
            const content = document.getElementById('main-content');
            if(id === 'dashboard') content.innerHTML = `<div class="bg-white p-8 rounded-3xl">Dashboard Utama</div>`;
            else if(id === 'master') renderMasterProduk();
            else if(id === 'laporan') renderLaporan();
        }

        async function renderLaporan() {
            const { data } = await db.from('sales').select('*');
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <table class="w-full text-left">
                        <thead><tr class="text-gray-400"><th>Produk</th><th>Total</th></tr></thead>
                        <tbody>${data?.map(s => `<tr><td class="p-4 border-b">${s.nama_produk}</td><td class="p-4 border-b">Rp ${s.total_harga}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
        }

        async function renderMasterProduk() {
            const { data } = await db.from('products').select('*');
            document.getElementById('main-content').innerHTML = `
                <div class="bg-white p-6 rounded-3xl">
                    <table class="w-full">
                        <tbody>${data?.map(p => `<tr><td class="p-4">${p.nama_produk}</td><td class="p-4">Rp ${p.harga_jual}</td></tr>`).join('')}</tbody>
                    </table>
                </div>`;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
