<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSA COFFEE APP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pbg: '#b8d1b9',      
                        pdark: '#2a632e',    
                        plight: '#f0f4f0',   
                    },
                    borderRadius: {
                        'pcard': '2.5rem',   
                    }
                }
            }
        }
    </script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #b8d1b9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a632e; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-pbg text-gray-800 font-sans antialiased overflow-hidden">

    <div id="view-login" class="min-h-screen w-full flex items-center justify-center relative px-4">
        <div class="absolute top-6 left-6 md:top-10 md:left-10">
            <img src="https://drive.google.com/uc?export=view&id=1sV2-TcbV6C4EsgYL5nc8mdFJTqe4Msf1" alt="PUSA COFFEE" class="h-10 md:h-14 object-contain">
        </div>

        <div class="bg-white rounded-pcard shadow-2xl max-w-sm w-full p-8 pt-16 relative mt-12">
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 w-24 h-24 bg-pdark rounded-2xl border-[6px] border-white flex items-center justify-center overflow-hidden shadow-lg">
                <img src="https://drive.google.com/uc?export=view&id=19oqB_nWQNiYs6shWlA2PeF2r-aVXukQr" alt="Barista" class="w-full h-full object-cover">
            </div>

            <div class="text-center mb-8">
                <h2 class="text-xl font-bold text-pdark">SELAMAT DATANG</h2>
                <p class="text-sm text-gray-400 mt-1">Silakan masuk ke akun Anda</p>
            </div>

            <div id="login-error" class="hidden bg-red-100 text-red-600 text-sm p-3 rounded-xl mb-4 text-center font-semibold"></div>

            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block uppercase font-bold text-pdark text-xs mb-2 tracking-wide pl-2">Email Akun</label>
                    <input type="email" id="email" class="w-full bg-plight rounded-2xl py-3 px-5 text-pdark font-semibold focus:outline-none focus:ring-2 focus:ring-pdark transition-all placeholder-gray-400" placeholder="owner@pusacoffee.com" required autocomplete="off">
                </div>
                <div class="mb-8">
                    <label class="block uppercase font-bold text-pdark text-xs mb-2 tracking-wide pl-2">Password</label>
                    <input type="password" id="password" class="w-full bg-plight rounded-2xl py-3 px-5 text-pdark font-semibold focus:outline-none focus:ring-2 focus:ring-pdark transition-all placeholder-gray-400" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btn-login" class="w-full bg-pdark text-white font-bold rounded-2xl py-4 hover:bg-opacity-90 transition-all shadow-md flex justify-center items-center gap-2">
                    <span>MASUK</span>
                    <i class="ph ph-sign-in text-xl"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="view-app" class="hidden h-screen w-full flex bg-gray-50">
        <div class="w-64 bg-pdark text-white flex flex-col transition-all duration-300">
            <div class="h-20 flex items-center justify-center border-b border-white/10 px-4">
                <img src="https://drive.google.com/uc?export=view&id=1sV2-TcbV6C4EsgYL5nc8mdFJTqe4Msf1" alt="PUSA COFFEE" class="h-8 object-contain filter brightness-0 invert">
            </div>
            
            <div class="p-4 flex items-center gap-3 border-b border-white/10">
                <div class="w-10 h-10 rounded-xl bg-pbg flex items-center justify-center overflow-hidden border-2 border-white">
                    <img src="https://drive.google.com/uc?export=view&id=19oqB_nWQNiYs6shWlA2PeF2r-aVXukQr" class="w-full h-full object-cover">
                </div>
                <div>
                    <div id="user-name-display" class="font-bold text-sm">Nama User</div>
                    <div id="user-role-display" class="text-xs text-pbg opacity-80 uppercase">ROLE</div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-menu"></div>

            <div class="p-4 border-t border-white/10">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-red-300 hover:bg-white/10 rounded-xl transition-all font-semibold">
                    <i class="ph ph-sign-out text-xl"></i> Keluar
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
            
            <div class="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-8 z-10 shadow-sm shrink-0">
                <h1 id="page-title" class="text-2xl font-bold text-pdark">Dashboard</h1>
                <div class="flex items-center gap-4">
                    <button onclick="alert('Belum ada notifikasi baru untuk Anda hari ini.')" class="w-10 h-10 bg-plight rounded-xl flex items-center justify-center text-pdark relative hover:bg-pbg transition-colors">
                        <i class="ph ph-bell text-xl"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <button onclick="logout()" class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-600 hover:bg-red-100 transition-colors hidden md:flex" title="Keluar">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-8 bg-gray-50 fade-in" id="main-content"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-pbg opacity-20 rounded-tl-full pointer-events-none -z-0"></div>
        </div>
    </div>

    <script>
        // PASTIKAN KUNCI API DI BAWAH INI SUDAH BENAR LENGKAP
        const SUPABASE_URL = 'https://osrlijqkewwmrxzvxpqt.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_3Gy9v5yQa69iQFwoAJwHuQ_JruTy5yQa69iQFwoAJwHuQ'; // Masukkan seluruh sisa string di belakang Q... jika ini terpotong

        let db;
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            console.error("SDK Supabase gagal dimuat.");
        }

        let currentUser = null;

        const MENUS = {
            OWNER: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'master', label: 'Master Data', icon: 'ph-database', sub: ['Master Akses', 'Master Akun', 'Master Produk', 'Master Harga', 'Master Resep'] },
                { id: 'stock', label: 'Stock', icon: 'ph-package', sub: ['Stock Masuk', 'Stock Adjustment', 'Stock Opname', 'Riwayat Stock'] },
                { id: 'shift', label: 'Shift', icon: 'ph-clock', sub: ['Monitoring Shift', 'Approval Shift', 'Riwayat Shift'] },
                { id: 'keuangan', label: 'Keuangan', icon: 'ph-wallet', sub: ['Input Pengeluaran', 'Cash Flow', 'Approval Pengeluaran'] },
                { id: 'laporan', label: 'Laporan', icon: 'ph-chart-line-up', sub: ['Penjualan', 'Stock', 'Laba Rugi', 'Food Cost'] },
                { id: 'pengaturan', label: 'Pengaturan', icon: 'ph-gear' }
            ],
            KARYAWAN: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'shift_k', label: 'Shift Operasional', icon: 'ph-clock', sub: ['Buka Shift', 'Input Laporan', 'Tutup Shift'] },
                { id: 'stock_keluar', label: 'Stock Keluar', icon: 'ph-box-arrow-up' },
                { id: 'riwayat', label: 'Riwayat Laporan', icon: 'ph-clock-counter-clockwise' },
                { id: 'profil', label: 'Profil Saya', icon: 'ph-user' }
            ]
        };

        window.addEventListener('DOMContentLoaded', async () => {
            if (!db) return;
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                fetchUserProfile(session.user);
            }
        });

        async function handleLogin(e) {
            e.preventDefault();
            if (!db) return alert("Database gagal dimuat.");
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');
            
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Memproses...';
            btn.disabled = true;
            err.classList.add('hidden');

            const { data, error } = await db.auth.signInWithPassword({ email: email, password: password });

            if (error) {
                err.textContent = "Gagal Masuk: " + error.message;
                err.classList.remove('hidden');
                resetLoginBtn(btn);
            } else {
                fetchUserProfile(data.user);
            }
        }

        async function fetchUserProfile(authUser) {
            const { data: profile, error } = await db
                .from('profiles')
                .select('nama, role, outlet, status')
                .eq('id', authUser.id)
                .single();

            if (error || !profile || profile.status !== 'Aktif') {
                alert("Akun tidak aktif atau belum disetel di tabel profil.");
                logout();
                return;
            }

            currentUser = {
                id: authUser.id,
                nama: profile.nama,
                role: profile.role,
                outlet: profile.outlet
            };
            initApp();
        }

        function resetLoginBtn(btn) {
            btn.innerHTML = '<span>MASUK</span><i class="ph ph-sign-in text-xl"></i>';
            btn.disabled = false;
        }

        async function logout() {
            if (db) await db.auth.signOut();
            currentUser = null;
            document.getElementById('view-app').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('form-login').reset();
            resetLoginBtn(document.getElementById('btn-login'));
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            document.getElementById('user-name-display').textContent = currentUser.nama;
            document.getElementById('user-role-display').textContent = currentUser.role;
            generateSidebar();
            loadPage('dashboard');
        }

        function generateSidebar() {
            const menuContainer = document.getElementById('sidebar-menu');
            menuContainer.innerHTML = ''; 
            const activeMenus = MENUS[currentUser.role];

            activeMenus.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full flex items-center justify-between px-4 py-3 text-white/80 hover:bg-white/10 hover:text-white rounded-xl transition-all group";
                btn.innerHTML = `<div class="flex items-center gap-3"><i class="ph ${item.icon} text-xl group-hover:text-pbg transition-colors"></i><span class="font-medium text-sm tracking-wide">${item.label}</span></div>` + (item.sub ? `<i class="ph ph-caret-down text-xs opacity-50"></i>` : '');
                menuContainer.appendChild(btn);

                if(item.sub) {
                    const subDiv = document.createElement('div');
                    subDiv.className = "pl-11 pr-4 py-2 space-y-1 hidden"; 
                    item.sub.forEach(subItem => {
                        const subBtn = document.createElement('div');
                        subBtn.className = "text-xs font-medium text-white/60 hover:text-pbg cursor-pointer py-2 transition-colors flex items-center gap-2";
                        subBtn.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-white/30"></div> ${subItem}`;
                        subBtn.onclick = (e) => { e.stopPropagation(); loadPage(item.id, subItem); };
                        subDiv.appendChild(subBtn);
                    });
                    menuContainer.appendChild(subDiv);
                    btn.onclick = () => subDiv.classList.toggle('hidden');
                } else {
                    btn.onclick = () => loadPage(item.id, item.label);
                }
            });
        }

        function loadPage(pageId, title = "Dashboard") {
            document.getElementById('page-title').textContent = title;
            const content = document.getElementById('main-content');
            content.innerHTML = '<div class="flex justify-center mt-20"><i class="ph ph-spinner animate-spin text-4xl text-pdark"></i></div>';

            setTimeout(async () => {
                if(pageId === 'dashboard') {
                    if(currentUser.role === 'OWNER') {
                        // Tarik data stok menipis dari tabel postgres asli
                        const { data: dbStocks } = await db.from('stocks').select('nama_bahan, qty, satuan').lt('qty', 50);
                        
                        renderDashboard({
                            omzet: "Rp 4.500.000",
                            laba: "Rp 1.250.000",
                            cup: 245,
                            lowStock: dbStocks && dbStocks.length ? dbStocks.map(s => ({ item: s.nama_bahan, sisa: s.qty + " " + s.satuan })) : [
                                { item: "Bubuk Kopi", sisa: "120 gr" },
                                { item: "UHT Susu", sisa: "3 pcs" }
                            ]
                        });
                    } else {
                        renderDashboard({ shiftStatus: "OPEN", kasAwal: "Rp 500.000", cupHariIni: 45 });
                    }
                } else {
                    renderDefaultView(title);
                }
            }, 300);
        }

        function renderDashboard(data) {
            const content = document.getElementById('main-content');
            if(currentUser.role === 'OWNER') {
                content.innerHTML = `
                    <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-wrap gap-4 items-end fade-in z-10 relative border border-gray-50">
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">DARI TANGGAL</label><input type="date" class="bg-plight rounded-xl px-4 py-2 text-sm text-pdark outline-none focus:ring-2 focus:ring-pbg"></div>
                        <div><label class="block text-xs font-bold text-gray-500 mb-1">SAMPAI TANGGAL</label><input type="date" class="bg-plight rounded-xl px-4 py-2 text-sm text-pdark outline-none focus:ring-2 focus:ring-pbg"></div>
                        <button onclick="alert('Filter akan berfungsi setelah semua data penjualan dihubungkan ke PostgreSQL.')" class="bg-pdark text-white px-6 py-2 rounded-xl text-sm font-bold shadow hover:bg-opacity-90 flex items-center gap-2"><i class="ph ph-funnel"></i> TERAPKAN</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6 fade-in">
                        <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center"><i class="ph ph-trend-up text-2xl text-green-600"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Total Omzet</div><div class="text-xl font-black text-gray-800 mt-1">${data.omzet}</div></div></div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-pbg rounded-2xl flex items-center justify-center"><i class="ph ph-money text-2xl text-pdark"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Laba Bersih</div><div class="text-xl font-black text-gray-800 mt-1">${data.laba}</div></div></div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center"><i class="ph ph-coffee text-2xl text-orange-600"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Cup Terjual</div><div class="text-xl font-black text-gray-800 mt-1">${data.cup}</div></div></div>
                        <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center"><i class="ph ph-trend-down text-2xl text-red-600"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Pengeluaran</div><div class="text-xl font-black text-gray-800 mt-1">Rp 800.000</div></div></div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                        <div class="bg-white p-6 rounded-3xl shadow-sm col-span-2 border border-gray-50 flex flex-col">
                            <h3 class="font-bold text-pdark mb-4 uppercase text-sm flex items-center gap-2"><i class="ph ph-chart-line-up"></i> Tren Penjualan</h3>
                            <div class="flex-1 bg-plight rounded-2xl flex items-center justify-center border border-dashed border-pdark/30 min-h-[250px]"><div class="text-center"><i class="ph ph-chart-bar text-4xl text-gray-400 mb-2"></i><p class="text-gray-500 font-medium text-sm">Kanvas Grafik Siap</p></div></div>
                        </div>

                        <div class="flex flex-col gap-6">
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-50">
                                <h3 class="font-bold text-pdark mb-4 uppercase text-sm flex items-center gap-2"><i class="ph ph-medal"></i> Top 5 Terlaris</h3>
                                <div class="space-y-3">
                                    <div class="flex justify-between items-center p-3 bg-plight rounded-xl"><span class="font-bold text-gray-800 text-sm">1. Kopi Susu Pusa</span><span class="text-pdark text-xs font-bold">120 Cup</span></div>
                                    <div class="flex justify-between items-center p-3 bg-plight rounded-xl"><span class="font-bold text-gray-800 text-sm">2. Americano</span><span class="text-pdark text-xs font-bold">85 Cup</span></div>
                                    <div class="flex justify-between items-center p-3 bg-plight rounded-xl"><span class="font-bold text-gray-800 text-sm">3. Matcha Latte</span><span class="text-pdark text-xs font-bold">50 Cup</span></div>
                                </div>
                            </div>
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-50">
                                <h3 class="font-bold text-red-600 mb-4 uppercase text-sm flex items-center gap-2"><i class="ph ph-warning-circle"></i> Stok Menipis</h3>
                                <div class="space-y-3">
                                    ${data.lowStock.map(item => `<div class="flex justify-between items-center p-3 bg-red-50 rounded-xl border border-red-100"><span class="font-semibold text-gray-800 text-sm">${item.item}</span><span class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-lg">${item.sisa}</span></div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>`;
            } else {
                content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 fade-in"><div class="bg-pdark text-white p-6 rounded-3xl shadow-lg relative overflow-hidden"><h3 class="text-pbg text-sm font-bold mb-1 uppercase">Status Shift</h3><div class="text-4xl font-black">${data.shiftStatus}</div><i class="ph ph-clock absolute -right-4 -bottom-4 text-8xl text-white opacity-10"></i></div></div>`;
            }
        }

        function renderDefaultView(title) {
            document.getElementById('main-content').innerHTML = `<div class="bg-white p-12 rounded-3xl text-center mt-10 fade-in border border-gray-50"><div class="w-20 h-20 bg-plight rounded-3xl flex items-center justify-center text-pdark mx-auto mb-6"><i class="ph ph-hammer text-4xl"></i></div><h3 class="text-2xl font-bold text-pdark mb-2">Modul ${title}</h3><p class="text-gray-500">Antarmuka ini siap dihubungkan ke operasi tabel PostgreSQL (Supabase).</p><button onclick="loadPage('dashboard')" class="mt-8 bg-pbg bg-opacity-30 text-pdark font-bold px-6 py-3 rounded-xl hover:bg-opacity-50 transition-colors">Kembali ke Dashboard</button></div>`;
        }
    </script>
</body>
</html>
