<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSA COFFEE APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { pbg: '#b8d1b9', pdark: '#2a632e', plight: '#f0f4f0' }, borderRadius: { 'pcard': '2.5rem' } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #b8d1b9; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-pbg text-gray-800 font-sans antialiased overflow-hidden">

    <div id="view-login" class="min-h-screen w-full flex items-center justify-center relative px-4">
        <div class="bg-white rounded-pcard shadow-2xl max-w-sm w-full p-8 pt-16 mt-12">
            <div class="text-center mb-8">
                <h2 class="text-xl font-bold text-pdark">PUSA COFFEE</h2>
                <p class="text-sm text-gray-400">Silakan masuk</p>
            </div>
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="mb-5"><input type="email" id="email" class="w-full bg-plight rounded-2xl py-3 px-5" placeholder="Email" required></div>
                <div class="mb-8"><input type="password" id="password" class="w-full bg-plight rounded-2xl py-3 px-5" placeholder="Password" required></div>
                <button type="submit" id="btn-login" class="w-full bg-pdark text-white font-bold rounded-2xl py-4">MASUK</button>
            </form>
        </div>
    </div>

    <div id="view-app" class="hidden h-screen w-full flex bg-gray-50">
        <div class="w-64 bg-pdark text-white flex flex-col shrink-0">
            <div class="h-20 flex items-center justify-center font-bold text-lg border-b border-white/10">PUSA COFFEE</div>
            <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-menu"></div>
            <div class="p-4 border-t border-white/10"><button onclick="logout()" class="w-full text-red-300 font-bold">KELUAR</button></div>
        </div>
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <div class="h-20 bg-white border-b flex items-center px-8 shadow-sm justify-between">
                <h1 id="page-title" class="text-2xl font-bold text-pdark">Dashboard</h1>
            </div>
            <div class="flex-1 overflow-y-auto p-8 fade-in" id="main-content"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://osrlijqkewwmrxzvxpqt.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_3Gy9v5yQa69iQFwoAJwHuQ_JruTyt_k';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        const MENUS = {
            OWNER: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'master', label: 'Master Produk', icon: 'ph-database' },
                { id: 'stock', label: 'Stock Masuk', icon: 'ph-package' },
                { id: 'laporan', label: 'Laporan Penjualan', icon: 'ph-chart-line-up' }
            ]
        };

        async function handleLogin(e) {
            e.preventDefault();
            const { data, error } = await db.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });
            if (error) alert(error.message);
            else { currentUser = { id: data.user.id, role: 'OWNER' }; initApp(); }
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            const menuContainer = document.getElementById('sidebar-menu');
            MENUS.OWNER.forEach(m => {
                const btn = document.createElement('button');
                btn.className = "w-full flex items-center gap-3 px-4 py-3 text-white/80 hover:bg-white/10 rounded-xl";
                btn.innerHTML = `<i class="ph ${m.icon}"></i> ${m.label}`;
                btn.onclick = () => loadPage(m.id, m.label);
                menuContainer.appendChild(btn);
            });
            loadPage('dashboard', 'Dashboard');
        }

        function loadPage(pageId, title) {
            document.getElementById('page-title').textContent = title;
            const content = document.getElementById('main-content');
            if(pageId === 'dashboard') renderDashboardView();
            else if(pageId === 'laporan') renderLaporanView();
            else content.innerHTML = `<div class="text-center mt-20">Fitur ${title} segera hadir.</div>`;
        }

        async function renderLaporanView() {
            const content = document.getElementById('main-content');
            content.innerHTML = `<div class="bg-white p-6 rounded-3xl shadow-sm"><h3 class="font-bold mb-4">Data Transaksi</h3><table class="w-full text-left"><tbody id="tb-lap"><tr><td class="p-4">Memuat...</td></tr></tbody></table></div>`;
            const { data } = await db.from('sales').select('*').order('tanggal', { ascending: false });
            const tb = document.getElementById('tb-lap');
            if (data && data.length > 0) {
                tb.innerHTML = data.map(s => `<tr><td class="p-2 border-b">${s.nama_produk}</td><td class="p-2 border-b">Rp ${s.total_harga}</td></tr>`).join('');
            } else { tb.innerHTML = `<tr><td class="p-4">Belum ada data.</td></tr>`; }
        }

        async function renderDashboardView() {
            document.getElementById('main-content').innerHTML = `<div class="text-2xl font-bold text-pdark">Selamat Datang di Pusa Coffee</div>`;
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
