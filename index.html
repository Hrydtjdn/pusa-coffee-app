<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSA COFFEE APP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pbg: '#b8d1b9',      
                        pdark: '#1b4324', /* Disetel lebih gelap agar sesuai desain gambar */
                        plight: '#f4f7f4',   
                    },
                    borderRadius: {
                        'pcard': '2.5rem',   
                    }
                }
            }
        }
    </script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #b8d1b9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #1b4324; }
        
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Wizard Stepper Styling */
        .step-active { background-color: #1b4324; color: white; border-color: #1b4324; }
        .step-inactive { background-color: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; }
        .step-line-active { background-color: #1b4324; }
        .step-line-inactive { background-color: #e5e7eb; }
    </style>
</head>
<body class="bg-pbg text-gray-800 font-sans antialiased overflow-hidden">

    <!-- ============================================== -->
    <!-- HALAMAN LOGIN -->
    <!-- ============================================== -->
    <div id="view-login" class="min-h-screen w-full flex items-center justify-center relative px-4">
        <div class="absolute top-6 left-6 md:top-10 md:left-10">
            <img src="https://drive.google.com/uc?export=view&id=1sV2-TcbV6C4EsgYL5nc8mdFJTqe4Msf1" alt="PUSA COFFEE" class="h-10 md:h-14 object-contain">
        </div>

        <div class="bg-white rounded-pcard shadow-2xl max-w-sm w-full p-8 pt-16 relative mt-12">
            <div class="absolute -top-12 left-1/2 transform -translate-x-1/2 w-24 h-24 bg-pdark rounded-2xl border-[6px] border-white flex items-center justify-center overflow-hidden shadow-lg">
                <img src="https://drive.google.com/uc?export=view&id=19oqB_nWQNiYs6shWlA2PeF2r-aVXukQr" alt="Barista" class="w-full h-full object-cover">
            </div>

            <div class="text-center mb-8">
                <h2 class="text-xl font-bold text-pdark">SELAMAT DATANG</h2>
                <p class="text-sm text-gray-400 mt-1">Silakan masuk ke akun Anda</p>
            </div>

            <div id="login-error" class="hidden bg-red-100 text-red-600 text-sm p-3 rounded-xl mb-4 text-center font-semibold"></div>

            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block uppercase font-bold text-pdark text-xs mb-2 tracking-wide pl-2">Email Akun</label>
                    <input type="email" id="email" class="w-full bg-plight rounded-2xl py-3 px-5 text-pdark font-semibold focus:outline-none focus:ring-2 focus:ring-pdark transition-all placeholder-gray-400" required autocomplete="off">
                </div>
                <div class="mb-8">
                    <label class="block uppercase font-bold text-pdark text-xs mb-2 tracking-wide pl-2">Password</label>
                    <input type="password" id="password" class="w-full bg-plight rounded-2xl py-3 px-5 text-pdark font-semibold focus:outline-none focus:ring-2 focus:ring-pdark transition-all placeholder-gray-400" required>
                </div>
                <button type="submit" id="btn-login" class="w-full bg-pdark text-white font-bold rounded-2xl py-4 hover:bg-opacity-90 transition-all shadow-md flex justify-center items-center gap-2">
                    <span>MASUK</span>
                    <i class="ph ph-sign-in text-xl"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- MAIN APLIKASI (DASHBOARD & MODUL) -->
    <!-- ============================================== -->
    <div id="view-app" class="hidden h-screen w-full flex bg-gray-50">
        <!-- SIDEBAR -->
        <div class="w-64 bg-pdark text-white flex flex-col transition-all duration-300 shrink-0 relative z-20">
            <div class="h-20 flex items-center justify-center border-b border-white/10 px-4">
                <img src="https://drive.google.com/uc?export=view&id=1sV2-TcbV6C4EsgYL5nc8mdFJTqe4Msf1" alt="PUSA COFFEE" class="h-8 object-contain filter brightness-0 invert">
            </div>
            
            <div class="p-4 flex items-center gap-3 border-b border-white/10">
                <div class="w-10 h-10 rounded-xl bg-pbg flex items-center justify-center overflow-hidden border-2 border-white">
                    <img src="https://drive.google.com/uc?export=view&id=19oqB_nWQNiYs6shWlA2PeF2r-aVXukQr" class="w-full h-full object-cover">
                </div>
                <div>
                    <div id="user-name-display" class="font-bold text-sm">Nama User</div>
                    <div id="user-role-display" class="text-xs text-pbg opacity-80 uppercase">ROLE</div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="sidebar-menu"></div>

            <div class="p-4 border-t border-white/10">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-red-300 hover:bg-white/10 rounded-xl transition-all font-semibold">
                    <i class="ph ph-sign-out text-xl"></i> Keluar
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden relative z-10">
            <!-- HEADER ATAS -->
            <div class="h-20 bg-white border-b border-gray-100 flex items-center justify-between px-8 z-10 shadow-sm shrink-0">
                <h1 id="page-title" class="text-2xl font-bold text-pdark">Dashboard</h1>
                <div class="flex items-center gap-4">
                    <button onclick="alert('Sistem terhubung ke PostgreSQL')" class="w-10 h-10 bg-plight rounded-xl flex items-center justify-center text-pdark relative hover:bg-pbg transition-colors">
                        <i class="ph ph-bell text-xl"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <button onclick="logout()" class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-600 hover:bg-red-100 transition-colors hidden md:flex" title="Keluar">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- KONTEN UTAMA DINAMIS -->
            <div class="flex-1 overflow-y-auto p-8 bg-gray-50 fade-in relative" id="main-content"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-pbg opacity-20 rounded-tl-full pointer-events-none -z-10"></div>
        </div>
    </div>

    <!-- Modal Produk -->
    <div id="modal-produk" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title-produk" class="text-lg font-black text-pdark uppercase flex items-center gap-2"><i class="ph ph-coffee"></i> Tambah Menu</h3>
                <button onclick="tutupModalProduk()" class="w-8 h-8 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200"><i class="ph ph-x"></i></button>
            </div>
            <form id="form-produk" onsubmit="simpanProdukBaru(event)">
                <div class="space-y-4 mb-6">
                    <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nama Menu</label><input type="text" id="p-nama" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark" required></div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Kategori</label>
                        <select id="p-kategori" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark"><option value="Coffee">Coffee</option><option value="Non-Coffee">Non-Coffee</option><option value="Makanan">Makanan</option><option value="Cemilan">Cemilan</option></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Modal (Rp)</label><input type="number" id="p-modal" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark" required></div>
                        <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Jual (Rp)</label><input type="number" id="p-jual" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark" required></div>
                    </div>
                </div>
                <button type="submit" id="btn-simpan-produk" class="w-full bg-pdark text-white font-bold p-4 rounded-xl shadow-md hover:bg-opacity-95">SIMPAN DATA</button>
            </form>
        </div>
    </div>
    <!-- Modal Stock -->
    <div id="modal-stock" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-md w-full shadow-2xl fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title-stock" class="text-lg font-black text-pdark uppercase flex items-center gap-2"><i class="ph ph-package"></i> Input Stok</h3>
                <button onclick="tutupModalStock()" class="w-8 h-8 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200"><i class="ph ph-x"></i></button>
            </div>
            <form id="form-stock" onsubmit="simpanStockBaru(event)">
                <div class="space-y-4 mb-6">
                    <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Nama Bahan</label><input type="text" id="s-nama" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark" required></div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Kategori Bahan</label>
                        <select id="s-kategori" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark"><option value="Bahan Utama">Bahan Utama</option><option value="Susu & Sirup">Susu & Sirup</option><option value="Packaging">Packaging</option><option value="Lainnya">Lainnya</option></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-bold text-gray-400 uppercase mb-2">Jumlah (Qty)</label><input type="number" step="0.01" id="s-qty" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark" required></div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Satuan</label>
                            <select id="s-satuan" class="w-full bg-plight rounded-xl p-3 text-sm font-semibold text-pdark outline-none focus:ring-2 focus:ring-pdark"><option value="Gram">Gram</option><option value="Ml">Ml</option><option value="Pcs">Pcs</option><option value="Pack">Pack</option></select>
                        </div>
                    </div>
                </div>
                <button type="submit" id="btn-simpan-stock" class="w-full bg-pdark text-white font-bold p-4 rounded-xl shadow-md hover:bg-opacity-95">SIMPAN STOK</button>
            </form>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- LOGIKA JAVASCRIPT UTAMA -->
    <!-- ============================================== -->
    <script>
        const SUPABASE_URL = 'https://osrlijqkewwmrxzvxpqt.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_3Gy9v5yQa69iQFwoAJwHuQ_JruTyt_k';

        let db;
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        let currentUser = null;
        let produkListLocal = []; 
        let editProductId = null; 
        
        let stockListLocal = [];
        let editStockId = null;

        // State Manajemen Laporan Shift (Wizard)
        let wizardStep = 1;
        let formPenjualan = { 
            tanggal: new Date().toISOString().split('T')[0], 
            rincian: [], // Array objek: { id, nama, qty }
            cash: '', qris: '', transfer: '' 
        };
        let formStockKeluar = {}; 
        let formPengeluaran = []; 

        const MENUS = {
            OWNER: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'laporan_shift', label: 'Input Laporan Shift', icon: 'ph-clipboard-text' },
                { id: 'master', label: 'Master Data', icon: 'ph-database', sub: ['Master Akses', 'Master Akun', 'Master Produk', 'Master Harga', 'Master Resep'] },
                { id: 'stock', label: 'Stock', icon: 'ph-package', sub: ['Stock Masuk', 'Stock Adjustment', 'Stock Opname', 'Riwayat Stock'] },
                { id: 'shift', label: 'Shift', icon: 'ph-clock', sub: ['Monitoring Shift', 'Approval Shift', 'Riwayat Shift'] },
                { id: 'keuangan', label: 'Keuangan', icon: 'ph-wallet', sub: ['Input Pengeluaran', 'Cash Flow', 'Approval Pengeluaran'] },
                { id: 'laporan', label: 'Laporan', icon: 'ph-chart-line-up', sub: ['Penjualan', 'Stock', 'Laba Rugi', 'Food Cost'] },
                { id: 'pengaturan', label: 'Pengaturan', icon: 'ph-gear' }
            ],
            KARYAWAN: [
                { id: 'dashboard', label: 'Dashboard', icon: 'ph-squares-four' },
                { id: 'laporan_shift', label: 'Input Laporan Shift', icon: 'ph-clipboard-text' },
                { id: 'shift_k', label: 'Shift Operasional', icon: 'ph-clock', sub: ['Buka Shift', 'Tutup Shift'] },
                { id: 'riwayat', label: 'Riwayat Laporan', icon: 'ph-clock-counter-clockwise' },
                { id: 'profil', label: 'Profil Saya', icon: 'ph-user' }
            ]
        };

        window.addEventListener('DOMContentLoaded', async () => {
            if (!db) return;
            const { data: { session } } = await db.auth.getSession();
            if (session) fetchUserProfile(session.user);
        });

        async function handleLogin(e) {
            e.preventDefault();
            if (!db) return alert("Koneksi Supabase error.");
            
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Memproses...';
            btn.disabled = true;

            const { data, error } = await db.auth.signInWithPassword({ 
                email: document.getElementById('email').value, 
                password: document.getElementById('password').value 
            });

            if (error) {
                alert("Gagal Masuk: " + error.message);
                btn.innerHTML = '<span>MASUK</span><i class="ph ph-sign-in text-xl"></i>';
                btn.disabled = false;
            } else {
                fetchUserProfile(data.user);
            }
        }

        async function fetchUserProfile(authUser) {
            const { data: profile, error } = await db.from('profiles').select('nama, role, outlet, status').eq('id', authUser.id).single();
            if (error || !profile || profile.status !== 'Aktif') { alert("Akun bermasalah."); logout(); return; }
            currentUser = { id: authUser.id, nama: profile.nama, role: profile.role, outlet: profile.outlet };
            initApp();
        }

        async function logout() {
            if (db) await db.auth.signOut();
            currentUser = null;
            document.getElementById('view-app').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('form-login').reset();
            document.getElementById('btn-login').disabled = false;
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            document.getElementById('user-name-display').textContent = currentUser.nama;
            document.getElementById('user-role-display').textContent = currentUser.role;
            generateSidebar();
            loadPage('dashboard');
        }

        function generateSidebar() {
            const menuContainer = document.getElementById('sidebar-menu');
            menuContainer.innerHTML = ''; 
            MENUS[currentUser.role].forEach(item => {
                const btn = document.createElement('button');
                const isHighlight = item.id === 'laporan_shift';
                
                btn.className = `w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all group ${isHighlight ? 'bg-pbg/20 text-white font-bold border border-pbg/30' : 'text-white/80 hover:bg-white/10 hover:text-white'}`;
                btn.innerHTML = `<div class="flex items-center gap-3"><i class="ph ${item.icon} text-xl group-hover:text-pbg transition-colors ${isHighlight ? 'text-pbg' : ''}"></i><span class="font-medium text-sm tracking-wide">${item.label}</span></div>` + (item.sub ? `<i class="ph ph-caret-down text-xs opacity-50"></i>` : '');
                menuContainer.appendChild(btn);

                if(item.sub) {
                    const subDiv = document.createElement('div');
                    subDiv.className = "pl-11 pr-4 py-2 space-y-1 hidden"; 
                    item.sub.forEach(subItem => {
                        const subBtn = document.createElement('div');
                        subBtn.className = "text-xs font-medium text-white/60 hover:text-pbg cursor-pointer py-2 transition-colors flex items-center gap-2";
                        subBtn.innerHTML = `<div class="w-1.5 h-1.5 rounded-full bg-white/30"></div> ${subItem}`;
                        subBtn.onclick = (e) => { e.stopPropagation(); loadPage(item.id, subItem); };
                        subDiv.appendChild(subBtn);
                    });
                    menuContainer.appendChild(subDiv);
                    btn.onclick = () => subDiv.classList.toggle('hidden');
                } else {
                    btn.onclick = () => loadPage(item.id, item.label);
                }
            });
        }

        function loadPage(pageId, title = "Dashboard") {
            document.getElementById('page-title').textContent = title;
            
            if (pageId === 'master' && title === 'Master Produk') { renderMasterProdukView(); return; }
            if (pageId === 'stock' && title === 'Stock Masuk') { renderStockView(); return; }
            if (pageId === 'laporan_shift') { wizardStep = 1; renderLaporanShiftView(); return; }

            const content = document.getElementById('main-content');
            content.innerHTML = '<div class="flex justify-center mt-20"><i class="ph ph-spinner animate-spin text-4xl text-pdark"></i></div>';

            setTimeout(async () => {
                if(pageId === 'dashboard') renderDashboardView();
                else renderDefaultView(title);
            }, 250);
        }

        async function renderDashboardView() {
            const content = document.getElementById('main-content');
            let htmlStok = '';
            let totalOmzet = 0; let labaBersih = 0; let totalCup = 0; let totalPengeluaran = 0;
            
            try {
                // Tarik Data Penjualan
                const { data: reports } = await db.from('shift_reports').select('total_omzet, total_cup');
                if (reports) {
                    totalOmzet = reports.reduce((sum, r) => sum + Number(r.total_omzet), 0);
                    totalCup = reports.reduce((sum, r) => sum + Number(r.total_cup), 0);
                }

                // Tarik Data Pengeluaran
                const { data: expenses } = await db.from('expenses').select('total');
                if (expenses) {
                    totalPengeluaran = expenses.reduce((sum, e) => sum + Number(e.total), 0);
                }

                labaBersih = totalOmzet - totalPengeluaran;

                // Tarik Stok Menipis
                const { data: dbStocks, error } = await db.from('stocks').select('nama_bahan, qty, satuan').lt('qty', 50).limit(4);
                let lowStockData = (!error && dbStocks) ? dbStocks.map(s => ({ item: s.nama_bahan, sisa: s.qty + " " + s.satuan })) : [];
                
                if(lowStockData.length > 0) {
                    htmlStok = lowStockData.map(item => `<div class="flex justify-between items-center p-3 bg-red-50 rounded-xl border border-red-100"><span class="font-semibold text-gray-800 text-sm">${item.item}</span><span class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-lg">${item.sisa}</span></div>`).join('');
                } else {
                    htmlStok = '<div class="text-sm text-gray-400 text-center py-4">Semua stok bahan dalam kondisi aman.</div>';
                }
            } catch(err) { console.log(err); }

            content.innerHTML = `
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-wrap gap-4 items-end fade-in border border-gray-50">
                    <div><label class="block text-xs font-bold text-gray-500 mb-1">DARI TANGGAL</label><input type="date" class="bg-plight rounded-xl px-4 py-2 text-sm text-pdark outline-none focus:ring-2 focus:ring-pbg"></div>
                    <div><label class="block text-xs font-bold text-gray-500 mb-1">SAMPAI TANGGAL</label><input type="date" class="bg-plight rounded-xl px-4 py-2 text-sm text-pdark outline-none focus:ring-2 focus:ring-pbg"></div>
                    <button class="bg-pdark text-white px-6 py-2 rounded-xl text-sm font-bold shadow hover:bg-opacity-90 flex items-center gap-2"><i class="ph ph-funnel"></i> TERAPKAN</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6 fade-in">
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center"><i class="ph ph-trend-up text-2xl text-green-600"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Total Omzet</div><div class="text-xl font-black text-gray-800 mt-1">Rp ${totalOmzet.toLocaleString('id-ID')}</div></div></div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-pbg rounded-2xl flex items-center justify-center"><i class="ph ph-money text-2xl text-pdark"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Laba Bersih</div><div class="text-xl font-black text-gray-800 mt-1">Rp ${labaBersih.toLocaleString('id-ID')}</div></div></div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center"><i class="ph ph-coffee text-2xl text-orange-600"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Cup Terjual</div><div class="text-xl font-black text-gray-800 mt-1">${totalCup} Cup</div></div></div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-50"><div class="w-14 h-14 bg-red-100 rounded-2xl flex items-center justify-center"><i class="ph ph-trend-down text-2xl text-red-600"></i></div><div><div class="text-xs font-bold text-gray-400 uppercase">Pengeluaran</div><div class="text-xl font-black text-gray-800 mt-1">Rp ${totalPengeluaran.toLocaleString('id-ID')}</div></div></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                    <div class="bg-white p-6 rounded-3xl shadow-sm col-span-2 border border-gray-50 flex flex-col">
                        <h3 class="font-bold text-pdark mb-4 uppercase text-sm flex items-center gap-2"><i class="ph ph-chart-line-up"></i> Tren Penjualan</h3>
                        <div class="flex-1 bg-plight rounded-2xl flex items-center justify-center border border-dashed border-pdark/30 min-h-[250px]"><p class="text-gray-500 font-medium text-sm">Grafik segera tersedia.</p></div>
                    </div>
                    <div class="flex flex-col gap-6">
                        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-50">

        // -- Logic Penjualan --
        function getQtyLapProduk(id) {
            let item = formPenjualan.rincian.find(x => x.id === id);
            return item ? item.qty : 0;
        }

        function ubahQtyLapProduk(id, nama, delta) {
            let item = formPenjualan.rincian.find(x => x.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    formPenjualan.rincian = formPenjualan.rincian.filter(x => x.id !== id);
                }
            } else if (delta > 0) {
                formPenjualan.rincian.push({ id, nama, qty: delta });
            }
            renderWizardStep(); // Re-render untuk update total dan input
        }

        function hitungOmzetLap() {
            let tot = Number(formPenjualan.cash) + Number(formPenjualan.qris) + Number(formPenjualan.transfer);
            document.getElementById('lap-total-omzet').textContent = 'Rp ' + tot.toLocaleString('id-ID');
        }

        // -- Logic Stock Keluar --
        function ubahLapStock(id, field, delta) {
            if(!formStockKeluar[id]) formStockKeluar[id] = {terpakai:0, tumpah:0};
            let current = Number(formStockKeluar[id][field]) || 0;
            let newValue = current + delta;
            if(newValue < 0) newValue = 0;
            formStockKeluar[id][field] = newValue;
            renderWizardStep();
        }
        
        function setLapStock(id, field, val) {
            if(!formStockKeluar[id]) formStockKeluar[id] = {terpakai:0, tumpah:0};
            let newValue = Number(val) || 0;
            if(newValue < 0) newValue = 0;
            formStockKeluar[id][field] = newValue;
            renderWizardStep();
        }

        // -- Logic Pengeluaran --
        function quickAddPengeluaran(nama, defaultHarga) {
            formPengeluaran.push({ id: Date.now() + Math.random(), nama: nama, qty: 1, harga: defaultHarga });
            renderWizardStep();
        }
        function tambahCustomPengeluaran() {
            let nama = prompt("Masukkan nama pengeluaran (Contoh: Sapu / Sabun):");
            if (nama) {
                formPengeluaran.push({ id: Date.now() + Math.random(), nama: nama, qty: 1, harga: 0 });
                renderWizardStep();
            }
        }
        function ubahQtyPengeluaran(id, delta) {
            let item = formPengeluaran.find(x => x.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty < 1) item.qty = 1;
                renderWizardStep();
            }
        }
        function ubahHargaPengeluaran(id, val) {
            let item = formPengeluaran.find(x => x.id === id);
            if (item) {
                item.harga = Number(val) || 0;
                // Update text di DOM langsung agar input box tidak kehilangan fokus saat mengetik
                let tot = item.harga * item.qty;
                let elDesk = document.getElementById('tot-harga-'+id);
                let elMob = document.getElementById('tot-harga-mob-'+id);
                if(elDesk) elDesk.textContent = 'Rp ' + tot.toLocaleString('id-ID');
                if(elMob) elMob.textContent = 'Rp ' + tot.toLocaleString('id-ID');
                
                // Update grand total badge
                let grandTot = formPengeluaran.reduce((sum, i) => sum + (i.harga * i.qty), 0);
                document.getElementById('tot-pengeluaran-badge').textContent = 'Total Harga: Rp ' + grandTot.toLocaleString('id-ID');
            }
        }
        function hapusPengeluaranItem(id) {
            formPengeluaran = formPengeluaran.filter(x => x.id !== id);
            renderWizardStep();
        }
        function editNamaPengeluaran(id) {
            let item = formPengeluaran.find(x => x.id === id);

                if(newNama) { item.nama = newNama; renderWizardStep(); }

        async function navWizard(dir) {
            if (dir === 1 && wizardStep === 3) {
                prosesSimpanLaporan();
            } else {
                wizardStep += dir;
                renderLaporanShiftView(); 
            }
        }

        async function prosesSimpanLaporan() {
            const btn = document.getElementById('btn-next-wizard');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Menyimpan...';
            btn.disabled = true;

            const totalOmzet = Number(formPenjualan.cash) + Number(formPenjualan.qris) + Number(formPenjualan.transfer);
            const totalCup = formPenjualan.rincian.reduce((sum, i) => sum + i.qty, 0);

            // 1. Simpan Data ke tabel shift_reports
            const { error: err1 } = await db.from('shift_reports').insert([{
                tanggal: formPenjualan.tanggal,
                kasir_nama: currentUser.nama,
                total_cup: totalCup,
                omzet_cash: formPenjualan.cash,
                omzet_qris: formPenjualan.qris,
                omzet_transfer: formPenjualan.transfer,
                total_omzet: totalOmzet,
                detail_penjualan: formPenjualan.rincian,
                detail_stock_keluar: formStockKeluar
            }]);

            // 2. Update Pengurangan Tabel Stocks
            for (const stock of stockListLocal) {
                let d = formStockKeluar[stock.id];
                if (d) {
                    let totalKeluar = Number(d.terpakai) + Number(d.tumpah);
                    if (totalKeluar > 0) {
                        let newQty = Number(stock.qty) - totalKeluar;
                        await db.from('stocks').update({ qty: newQty }).eq('id', stock.id);
                    }
                }
            }

            // 3. Simpan Pengeluaran ke tabel expenses
            if (formPengeluaran.length > 0) {
                const expPayload = formPengeluaran.map(ex => ({
                    tanggal: formPenjualan.tanggal,
                    nama_barang: ex.nama,
                    harga: ex.harga,
                    qty: ex.qty,
                    total: ex.harga * ex.qty
                }));
                await db.from('expenses').insert(expPayload);
            }

            if(err1) {
                alert("Terjadi kesalahan: " + err1.message);
                btn.innerHTML = 'SIMPAN LAPORAN'; btn.disabled = false;
            } else {
                alert("✅ LAPORAN SHIFT BERHASIL DISIMPAN!\nData penjualan, stok, dan pengeluaran telah diperbarui.");
                // Reset State
                formPenjualan = { tanggal: new Date().toISOString().split('T')[0], rincian: [], cash: '', qris: '', transfer: '' };
                formStockKeluar = {}; formPengeluaran = [];
                // Pindah ke Dashboard
                loadPage('dashboard');
            }
        }

        // ==============================================
        // MASTER DATA (PRODUK & STOCK)
        // ==============================================
        function renderMasterProdukView() {
            document.getElementById('main-content').innerHTML = `<div class="flex justify-between items-center mb-6 fade-in"><p class="text-sm text-gray-500 font-semibold">Kelola menu makanan & minuman kedai secara realtime.</p><button onclick="bukaModalProduk()" class="bg-pdark text-white font-bold px-5 py-3 rounded-xl shadow hover:bg-opacity-90 flex items-center gap-2 text-sm"><i class="ph ph-plus-circle text-lg"></i> TAMBAH MENU BARU</button></div><div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden fade-in"><table class="w-full text-left border-collapse"><thead><tr class="bg-plight text-pdark font-black text-xs uppercase tracking-wider border-b border-gray-100"><th class="p-4 pl-6">Nama Menu</th><th class="p-4">Kategori</th><th class="p-4 text-right">Harga Modal</th><th class="p-4 text-right">Harga Jual</th><th class="p-4 text-center">Status</th><th class="p-4 pr-6 text-center">Aksi</th></tr></thead><tbody id="table-body-produk" class="text-sm divide-y divide-gray-50"><tr><td colspan="6" class="p-10 text-center text-gray-400"><i class="ph ph-spinner animate-spin text-2xl mb-2 block mx-auto"></i> Memuat data...</td></tr></tbody></table></div>`;
            ambilDataProduk();
        }

        async function ambilDataProduk() {
            const tbody = document.getElementById('table-body-produk');
            if(!db) return;
            const { data, error } = await db.from('products').select('*').order('id', { ascending: false });
            if (error) { tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-red-500 font-bold">Gagal memuat</td></tr>`; return; }
            produkListLocal = data || []; 
            if (produkListLocal.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-gray-400">Belum ada menu terdaftar.</td></tr>`; return; }
            tbody.innerHTML = produkListLocal.map(item => `<tr class="hover:bg-gray-50"><td class="p-4 pl-6 font-bold text-gray-800">${item.nama_produk}</td><td class="p-4"><span class="bg-plight text-pdark font-bold text-xs px-2.5 py-1 rounded-md border border-pbg/20">${item.kategori}</span></td><td class="p-4 text-right font-semibold text-gray-500">Rp ${Number(item.harga_modal).toLocaleString('id-ID')}</td><td class="p-4 text-right font-black text-pdark">Rp ${Number(item.harga_jual).toLocaleString('id-ID')}</td><td class="p-4 text-center"><span class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-full">${item.status}</span></td><td class="p-4 pr-6 text-center flex justify-center gap-2"><button onclick="siapkanEditProduk(${item.id})" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 flex items-center justify-center"><i class="ph ph-pencil-simple"></i></button><button onclick="hapusProduk(${item.id})" class="w-8 h-8 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 flex items-center justify-center"><i class="ph ph-trash"></i></button></td></tr>`).join('');
        }

        function siapkanEditProduk(id) {
            const p = produkListLocal.find(x => x.id === id);
            if (!p) return; editProductId = id; 
            document.getElementById('p-nama').value = p.nama_produk; document.getElementById('p-kategori').value = p.kategori; document.getElementById('p-modal').value = p.harga_modal; document.getElementById('p-jual').value = p.harga_jual;
            document.getElementById('modal-title-produk').innerHTML = '<i class="ph ph-pencil-simple text-blue-600"></i> Edit Menu'; document.getElementById('btn-simpan-produk').innerHTML = 'SIMPAN PERUBAHAN';
            document.getElementById('modal-produk').classList.remove('hidden');
        }

        function bukaModalProduk() {
            editProductId = null; document.getElementById('form-produk').reset();
            document.getElementById('modal-title-produk').innerHTML = '<i class="ph ph-coffee"></i> Tambah Menu'; document.getElementById('btn-simpan-produk').innerHTML = 'SIMPAN DATA';
            document.getElementById('modal-produk').classList.remove('hidden');
        }

        function tutupModalProduk() { document.getElementById('modal-produk').classList.add('hidden'); }

        async function simpanProdukBaru(e) {
            e.preventDefault();
            const payload = { nama_produk: document.getElementById('p-nama').value, kategori: document.getElementById('p-kategori').value, harga_modal: parseFloat(document.getElementById('p-modal').value)||0, harga_jual: parseFloat(document.getElementById('p-jual').value)||0, status: 'Tersedia' };
            if (editProductId) await db.from('products').update(payload).eq('id', editProductId); else await db.from('products').insert([payload]);
            tutupModalProduk(); renderMasterProdukView(); 
        }

        async function hapusProduk(id) { if(confirm("Hapus permanen menu ini?")) { await db.from('products').delete().eq('id', id); renderMasterProdukView(); } }

        function renderStockView() {
            document.getElementById('main-content').innerHTML = `<div class="flex justify-between items-center mb-6 fade-in"><p class="text-sm text-gray-500 font-semibold">Manajemen stok bahan baku PUSA COFFEE.</p><button onclick="bukaModalStock()" class="bg-pdark text-white font-bold px-5 py-3 rounded-xl shadow hover:bg-opacity-90 flex items-center gap-2 text-sm"><i class="ph ph-plus-circle text-lg"></i> INPUT STOK BARU</button></div><div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden fade-in"><table class="w-full text-left border-collapse"><thead><tr class="bg-plight text-pdark font-black text-xs uppercase tracking-wider border-b border-gray-100"><th class="p-4 pl-6">Nama Bahan</th><th class="p-4">Kategori</th><th class="p-4 text-center">Qty</th><th class="p-4 text-center">Satuan</th><th class="p-4 pr-6 text-center">Aksi</th></tr></thead><tbody id="table-body-stock" class="text-sm divide-y divide-gray-50"><tr><td colspan="5" class="p-10 text-center text-gray-400"><i class="ph ph-spinner animate-spin text-2xl mb-2 block mx-auto"></i> Memuat data...</td></tr></tbody></table></div>`;
            ambilDataStock();
        }

        async function ambilDataStock() {
            const tbody = document.getElementById('table-body-stock');
            if(!db) return;
            const { data, error } = await db.from('stocks').select('*').order('nama_bahan', { ascending: true });
            if (error) { tbody.innerHTML = `<tr><td colspan="5" class="p-6 text-center text-red-500 font-bold">Gagal memuat</td></tr>`; return; }
            stockListLocal = data || []; 
            if (stockListLocal.length === 0) { tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">Stok masih kosong.</td></tr>`; return; }
            tbody.innerHTML = stockListLocal.map(item => `<tr class="hover:bg-gray-50"><td class="p-4 pl-6 font-bold text-gray-800">${item.nama_bahan}</td><td class="p-4"><span class="bg-plight text-gray-600 font-bold text-xs px-2.5 py-1 rounded-md border border-gray-200">${item.kategori}</span></td><td class="p-4 text-center"><span class="font-black ${item.qty < 50 ? 'text-red-600 bg-red-50' : 'text-gray-800 bg-gray-50'} px-3 py-1 rounded-lg">${item.qty}</span></td><td class="p-4 text-center font-semibold text-gray-500 uppercase text-xs">${item.satuan}</td><td class="p-4 pr-6 text-center flex justify-center gap-2"><button onclick="siapkanEditStock(${item.id})" class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 flex items-center justify-center"><i class="ph ph-pencil-simple"></i></button><button onclick="hapusStock(${item.id})" class="w-8 h-8 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 flex items-center justify-center"><i class="ph ph-trash"></i></button></td></tr>`).join('');
        }

        function siapkanEditStock(id) {
            const s = stockListLocal.find(x => x.id === id);
            if (!s) return; editStockId = id; 
            document.getElementById('s-nama').value = s.nama_bahan; document.getElementById('s-kategori').value = s.kategori; document.getElementById('s-qty').value = s.qty; document.getElementById('s-satuan').value = s.satuan;
            document.getElementById('modal-title-stock').innerHTML = '<i class="ph ph-pencil-simple text-blue-600"></i> Edit Stok'; document.getElementById('btn-simpan-stock').innerHTML = 'SIMPAN PERUBAHAN';
            document.getElementById('modal-stock').classList.remove('hidden');
        }

        function bukaModalStock() {
            editStockId = null; document.getElementById('form-stock').reset();
            document.getElementById('modal-title-stock').innerHTML = '<i class="ph ph-package"></i> Input Stok Baru'; document.getElementById('btn-simpan-stock').innerHTML = 'SIMPAN STOK';
            document.getElementById('modal-stock').classList.remove('hidden');
        }

        function tutupModalStock() { document.getElementById('modal-stock').classList.add('hidden'); }

        async function simpanStockBaru(e) {
            e.preventDefault();
            const payload = { nama_bahan: document.getElementById('s-nama').value, kategori: document.getElementById('s-kategori').value, qty: parseFloat(document.getElementById('s-qty').value)||0, satuan: document.getElementById('s-satuan').value };
            if (editStockId) await db.from('stocks').update(payload).eq('id', editStockId); else await db.from('stocks').insert([payload]);
            tutupModalStock(); renderStockView(); 
        }

        async function hapusStock(id) { if(confirm("Hapus data stok ini?")) { await db.from('stocks').delete().eq('id', id); renderStockView(); } }

        function renderDefaultView(title) { document.getElementById('main-content').innerHTML = `<div class="bg-white p-12 rounded-3xl text-center mt-10 fade-in border border-gray-50"><div class="w-20 h-20 bg-plight rounded-3xl flex items-center justify-center text-pdark mx-auto mb-6"><i class="ph ph-hammer text-4xl"></i></div><h3 class="text-2xl font-bold text-pdark mb-2">Modul ${title}</h3><p class="text-gray-500">Antarmuka ini siap dihubungkan ke operasi tabel PostgreSQL.</p></div>`; }
    </script>
</body>
</html>
